name: CI Pipeline

# Run on every push to main or develop, and on all pull requests to main
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # Job 1: Run backend tests 
  test-backend:
    name: Backend Tests (Python 3.11)
    runs-on: ubuntu-latest

    # Spin up a real Redis service container alongside the test runner.
    # GitHub Actions makes it available at localhost:6379.
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests with pytest
        working-directory: backend
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_DB: 0
          INSTANCE_ID: ci-runner
        run: pytest tests/ -v --tb=short

      - name: Print test summary
        if: always()
        run: echo "Backend tests completed for commit ${{ github.sha }}"


  # Job 2: Build Docker images
  # Only runs after tests pass (needs: test-backend)
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build ./backend \
            --tag rate-limiter-backend:${{ github.sha }} \
            --tag rate-limiter-backend:latest

      - name: Build frontend image
        run: |
          docker build ./frontend \
            --tag rate-limiter-frontend:${{ github.sha }} \
            --tag rate-limiter-frontend:latest

      - name: Verify images exist
        run: |
          docker images rate-limiter-backend
          docker images rate-limiter-frontend

      - name: Smoke test backend image
        run: |
          # Start Redis
          docker run -d --name redis-ci -p 6379:6379 redis:7-alpine
          # Start backend container
          docker run -d \
            --name backend-ci \
            -p 8000:8000 \
            -e REDIS_HOST=host.docker.internal \
            -e REDIS_PORT=6379 \
            -e INSTANCE_ID=ci-smoke \
            --add-host host.docker.internal:host-gateway \
            rate-limiter-backend:latest
          # Wait for startup
          sleep 5
          # Hit the health endpoint
          curl --fail http://localhost:8000/health || (docker logs backend-ci && exit 1)
          echo "Smoke test passed"
