server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # ── React Router support ─────────────────────────────────────────────
    # Any path that doesn't match a real file falls back to index.html
    # so React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ────────────────────────────────────────────────────────
    # Forward /api, /metrics, /admin, /health to the FastAPI backend.
    # "backend-1" resolves via the Docker Compose network.
    location /api/ {
        proxy_pass http://backend-1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /metrics {
        proxy_pass http://backend-1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /admin/ {
        proxy_pass http://backend-1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass http://backend-1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Caching ──────────────────────────────────────────────────────────
    # Static assets (JS/CSS) are content-hashed by Vite so they can be
    # cached forever.  HTML must not be cached so updates deploy instantly.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
